<style>
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    :root {
        --green:#4A7C59;
        --orange:#E8772E;
        --bg:#F8F5F0;
        --card:#fff;
        --text:#2d3436;
        --muted:#7a7a7a;
        --border:#e8e0d5;
        --red:#c0392b;
    }
    body {
        font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
        background:var(--bg);
        color:var(--text);
        min-height:100vh;
        padding:20px 16px 40px;
        display:flex;
        justify-content:center;
    }
    .app { width:100%; max-width:520px; }
    .header { text-align:center; margin-bottom:20px; }
    .logo { max-width:220px; width:70%; height:auto; margin:0 auto 8px; display:block; }
    .tagline { font-size:13px; color:var(--muted); font-style:italic; }
    .card {
        background:var(--card);
        border-radius:18px;
        padding:22px 20px;
        box-shadow:0 4px 16px rgba(74,124,89,0.08);
        margin-bottom:16px;
        border:1px solid var(--border);
    }
    .card h3 {
        font-size:13px;
        text-transform:uppercase;
        letter-spacing:1px;
        color:var(--green);
        margin-bottom:14px;
        font-weight:700;
    }
    .field { margin-bottom:14px; }
    .field:last-child { margin-bottom:0; }
    .field label {
        display:block;
        font-size:13px;
        font-weight:600;
        color:var(--text);
        margin-bottom:6px;
    }
    .field label .hint {
        color:var(--muted);
        font-weight:400;
        font-size:12px;
        margin-left:4px;
    }
    .input-wrap { position:relative; }
    .input-wrap input {
        width:100%;
        padding:12px 48px 12px 16px;
        border:2px solid var(--border);
        border-radius:12px;
        font-size:16px;
        background:#fafafa;
        color:var(--text);
        transition:all 0.2s;
        -webkit-appearance:none;
    }
    .input-wrap.has-prefix input { padding-left:44px; padding-right:16px; }
    .input-wrap input:focus { outline:none; border-color:var(--orange); background:#fff; }
    .input-wrap .suffix,
    .input-wrap .prefix {
        position:absolute;
        top:50%;
        transform:translateY(-50%);
        color:var(--muted);
        font-size:14px;
        font-weight:600;
        pointer-events:none;
    }
    .input-wrap .suffix { right:16px; }
    .input-wrap .prefix { left:16px; }
    .two-col { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .section-title {
        display:flex;
        align-items:center;
        gap:8px;
        margin-bottom:14px;
    }
    .dot {
        width:8px; height:8px; border-radius:50%;
        background:var(--orange);
    }
    .dot.green { background:var(--green); }
    .result-card {
        background:linear-gradient(135deg,var(--green),#3a6348);
        color:#fff;
        border-radius:18px;
        padding:18px 20px;
        margin-bottom:14px;
        box-shadow:0 6px 20px rgba(74,124,89,0.25);
    }
    .result-card.orange {
        background:linear-gradient(135deg,var(--orange),#c65d1a);
        box-shadow:0 6px 20px rgba(232,119,46,0.25);
    }
    .result-head {
        font-size:12px;
        opacity:0.85;
        text-transform:uppercase;
        letter-spacing:1px;
        margin-bottom:10px;
    }
    .result-row {
        display:flex;
        justify-content:space-between;
        align-items:center;
        padding:6px 0;
        font-size:14px;
    }
    .result-row.total {
        border-top:1px solid rgba(255,255,255,0.3);
        margin-top:6px;
        padding-top:10px;
        font-size:16px;
        font-weight:700;
    }
    .result-row .label { opacity:0.9; }
    .result-row .val { font-weight:600; }
    .margin-row {
        display:flex;
        justify-content:space-between;
        align-items:center;
        padding:10px 0 2px;
        border-top:1px solid rgba(255,255,255,0.3);
        margin-top:8px;
    }
    .margin-row .label { font-size:12px; opacity:0.9; text-transform:uppercase; letter-spacing:0.5px; }
    .margin-row .val { font-size:20px; font-weight:800; }
    .margin-row .pct { font-size:13px; opacity:0.9; margin-left:6px; font-weight:600; }
    .margin-row.loss .val { color:#ffd0c8; }
    .btn-reset {
        width:100%;
        padding:14px;
        background:#fff;
        border:2px solid var(--border);
        border-radius:12px;
        font-size:15px;
        font-weight:600;
        color:var(--muted);
        cursor:pointer;
        transition:all 0.2s;
    }
    .btn-reset:active { background:#f5f0e8; transform:scale(0.98); }
    .footer { text-align:center; font-size:11px; color:var(--muted); margin-top:20px; }
</style>
</head>

        <div class="tagline">Quick 3D Printing Cost Calculator</div>
    </div>

    <div class="card">
        <div class="section-title"><span class="dot green"></span><h3 style="margin:0">Per Unit</h3></div>
        <div class="two-col">
            <div class="field">
                <label>Weight <span class="hint">(g)</span></label>
                <div class="input-wrap">
                    <input type="number" id="weightUnit" placeholder="0" step="any" inputmode="decimal" oninput="calc()">
                    <span class="suffix">g</span>
                </div>
            </div>
            <div class="field">
                <label>Print Time <span class="hint">(hr)</span></label>
                <div class="input-wrap">
                    <input type="number" id="timeUnit" placeholder="0" step="any" inputmode="decimal" oninput="calc()">
                    <span class="suffix">hr</span>
                </div>
            </div>
        </div>
        <div class="field">
            <label>Selling Price / Unit</label>
            <div class="input-wrap has-prefix">
                <span class="prefix">RM</span>
                <input type="number" id="priceUnit" placeholder="0.00" step="any" inputmode="decimal" oninput="calc()">
            </div>
        </div>
    </div>

    <div class="card">
        <div class="section-title"><span class="dot"></span><h3 style="margin:0">Bulk</h3></div>
        <div class="two-col">
            <div class="field">
                <label>Weight <span class="hint">(g)</span></label>
                <div class="input-wrap">
                    <input type="number" id="weightBulk" placeholder="0" step="any" inputmode="decimal" oninput="calc()">
                    <span class="suffix">g</span>
                </div>
            </div>
            <div class="field">
                <label>Print Time <span class="hint">(hr)</span></label>
                <div class="input-wrap">
                    <input type="number" id="timeBulk" placeholder="0" step="any" inputmode="decimal" oninput="calc()">
                    <span class="suffix">hr</span>
                </div>
            </div>
        </div>
        <div class="two-col">
            <div class="field">
                <label>Bulk Qty <span class="hint">(pcs)</span></label>
                <div class="input-wrap">
                    <input type="number" id="bulkQty" placeholder="1" step="1" inputmode="numeric" oninput="calc()">
                    <span class="suffix">pcs</span>
                </div>
            </div>
            <div class="field">
                <label>Selling Price / Bulk</label>
                <div class="input-wrap has-prefix">
                    <span class="prefix">RM</span>
                    <input type="number" id="priceBulk" placeholder="0.00" step="any" inputmode="decimal" oninput="calc()">
                </div>
            </div>
        </div>
    </div>

    <div class="result-card">
        <div class="result-head">Unit Breakdown</div>
        <div class="result-row"><span class="label">Material</span><span class="val">RM <span id="uMat">0.00</span></span></div>
        <div class="result-row"><span class="label">Machine</span><span class="val">RM <span id="uMac">0.00</span></span></div>
        <div class="result-row total"><span class="label">Total Cost / Unit</span><span class="val">RM <span id="uCost">0.00</span></span></div>
        <div class="margin-row" id="uMarginRow">
            <span class="label">Margin / Unit</span>
            <div><span class="val">RM <span id="uMargin">0.00</span></span><span class="pct" id="uMarginPct">(0%)</span></div>
        </div>
    </div>

    <div class="result-card orange">
        <div class="result-head">Bulk Breakdown (per unit)</div>
        <div class="result-row"><span class="label">Material</span><span class="val">RM <span id="bMat">0.00</span></span></div>
        <div class="result-row"><span class="label">Machine</span><span class="val">RM <span id="bMac">0.00</span></span></div>
        <div class="result-row total"><span class="label">Total Cost / Unit</span><span class="val">RM <span id="bCost">0.00</span></span></div>
        <div class="margin-row" id="bMarginRow">
            <span class="label">Margin / Unit</span>
            <div><span class="val">RM <span id="bMargin">0.00</span></span><span class="pct" id="bMarginPct">(0%)</span></div>
        </div>
    </div>

    <button class="btn-reset" onclick="reset()">Reset All</button>
    <div class="footer">Maker n Cal &copy; 2026</div>
</div>

<script>
    const FILAMENT = 70;    // RM per kg
    const MATERIAL_MULT = 3; // 3x multiplier
    const MACHINE = 1.20;   // RM per hour (elec + depreciation)

    function v(id) { return parseFloat(document.getElementById(id).value) || 0; }
    function f(n) { return n.toFixed(2); }

    function calc() {
        // Unit
        const wU = v('weightUnit'), tU = v('timeUnit'), pU = v('priceUnit');
        const uMat = (wU / 1000) * FILAMENT * MATERIAL_MULT;
        const uMac = MACHINE * tU;
        const uCost = uMat + uMac;
        const uMargin = pU - uCost;
        const uPct = uCost > 0 ? (uMargin / uCost * 100) : 0;
        document.getElementById('uMat').textContent = f(uMat);
        document.getElementById('uMac').textContent = f(uMac);
        document.getElementById('uCost').textContent = f(uCost);
        document.getElementById('uMargin').textContent = f(uMargin);
        document.getElementById('uMarginPct').textContent = '(' + uPct.toFixed(0) + '%)';
        document.getElementById('uMarginRow').classList.toggle('loss', uMargin < 0);

        // Bulk (per unit)
        const wB = v('weightBulk'), tB = v('timeBulk'), pB = v('priceBulk');
        const qty = Math.max(1, v('bulkQty') || 1);
        const bMat = ((wB / 1000) * FILAMENT * MATERIAL_MULT) / qty;
        const bMac = (MACHINE * tB) / qty;
        const bCost = bMat + bMac;
        const bMargin = pB - bCost;
        const bPct = bCost > 0 ? (bMargin / bCost * 100) : 0;
        document.getElementById('bMat').textContent = f(bMat);
        document.getElementById('bMac').textContent = f(bMac);
        document.getElementById('bCost').textContent = f(bCost);
        document.getElementById('bMargin').textContent = f(bMargin);
        document.getElementById('bMarginPct').textContent = '(' + bPct.toFixed(0) + '%)';
        document.getElementById('bMarginRow').classList.toggle('loss', bMargin < 0);
    }

    function reset() {
        ['weightUnit','timeUnit','priceUnit','weightBulk','timeBulk','bulkQty','priceBulk'].forEach(id => {
            document.getElementById(id).value = '';
        });
        calc();
    }

    // PWA: register service worker
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('makerncal-sw.js').catch(e => console.log('SW failed', e));
        });
    }
</script>
